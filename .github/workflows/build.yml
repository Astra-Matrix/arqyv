name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: ARQYV-windows-x64
            ext: .exe

          - os: macos-latest
            artifact: ARQYV-macos-arm64
            ext: ""

          - os: ubuntu-latest
            artifact: ARQYV-linux-x64
            ext: ""

    runs-on: ${{ matrix.os }}
    name: Build — ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Qt runtime (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgl1 libglib2.0-0 libx11-6 libxext6 libxrender1 \
            libxkbcommon0 libxcb1 libxcb-util1 libxcb-icccm4 \
            libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0 libxcb-xfixes0 \
            libegl1 libopengl0 libdbus-1-3 libpulse0 \
            ffmpeg

      - name: Install Qt runtime (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Build with PyInstaller
        run: pyinstaller arqyv.spec --clean --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/ARQYV/* -DestinationPath dist/${{ matrix.artifact }}.zip
        shell: pwsh

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          tar -czf ${{ matrix.artifact }}.tar.gz ARQYV/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    name: GitHub Release

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
